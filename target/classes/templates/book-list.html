<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Book List')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <main class="container">
        <div class="bg-light p-5 rounded">
            <h1>Library Books</h1>
            <p class="lead">Manage your library collection easily.</p>
            
            <form th:action="@{/books}" method="get" class="row g-3 mb-4">
                <div class="col-auto">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title or author">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary mb-3">Search</button>
                    <a th:href="@{/books}" class="btn btn-secondary mb-3">Clear</a>
                </div>
            </form>

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td th:text="${book.title}">Title</td>
                        <td th:text="${book.author}">Author</td>
                        <td th:text="${book.isbn}">ISBN</td>
                        <td>
                            <span th:if="${book.available}" class="badge bg-success">Available</span>
                            <span th:unless="${book.available}" class="badge bg-danger" 
                                  th:title="'Borrowed by: ' + ${book.borrowedBy}">Borrowed</span>
                        </td>
                        <td>
                            <div class="btn-group" role="group">
                                <a th:if="${book.available}" sec:authorize="isAuthenticated()" 
                                   th:href="@{/books/borrow/{id}(id=${book.id})}" class="btn btn-sm btn-info">Borrow</a>
                                <a th:unless="${book.available}" sec:authorize="isAuthenticated()" 
                                   th:href="@{/books/return/{id}(id=${book.id})}" class="btn btn-sm btn-warning">Return</a>
                                <a sec:authorize="isAuthenticated()" th:href="@{/books/edit/{id}(id=${book.id})}" 
                                   class="btn btn-sm btn-primary">Edit</a>
                                <a sec:authorize="isAuthenticated()" th:href="@{/books/delete/{id}(id=${book.id})}" 
                                   class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="5" class="text-center">No books found.</td>
                    </tr>
                </tbody>
            </table>
            
            <a sec:authorize="isAuthenticated()" th:href="@{/books/add}" class="btn btn-success">Add New Book</a>
        </div>
    </main>

    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
