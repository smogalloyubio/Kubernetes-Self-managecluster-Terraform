name: Build gitaction workflow that deploy docker image to kubernestes  and google cloud 

on:
  push:
    branches:
       - qa 
    paths:
      - frontend/*
      - backend/*
      - .github/workflows/qa.ci.yaml 

permissions:
   contents: write 
   id-token: write 

jobs:
  gitleak-scan:
    name: Gitleak Scan 
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Gitleak scan 
        run: |
          docker run --rm \
              -v "${{ github.workspace }}:/repo" \
              zricethezav/gitleaks:latest detect \
              --source=/repo \
              --report-format=json \
              --report-path=/repo/gitleaks-report.json \
              --redact \
              --exit-code 0
      - name: Upload Artifact 
        uses: actions/upload-artifact@v4 
        with: 
           name:  gitleak-report
           path: ${{ github.workspace }}/gitleaks-report.json
           if-no-files-found: warn 

  checkov-terraform:
    name: Checkov Terraform scan 
    needs: [gitleak-scan] 
    runs-on: ubuntu-latest
    steps:
      - name: checkout source code 
        uses: actions/checkout@v4 

      - name: setup python 
        uses: actions/setup-python@v5 
        with:
          python-version: "3.12"

      - name: checkov install 
        run: pip install checkov
         
      - name: Run Terraform Scan 
        run: |
          checkov -d ./terraform \
            --framework terraform \
            --output json > checkov-terraform-report.json || true

      - name: Upload Checkov Artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkov-terraform-report
          path: ${{ github.workspace }}/checkov-terraform-report.json
          if-no-files-found: error

  checkov-frontend:
    name: Checkov dockerfile frontend scan 
    needs: [gitleak-scan]
    runs-on: ubuntu-latest
    steps:
      - name: checkout source code 
        uses: actions/checkout@v4

      - name: setup python 
        uses: actions/setup-python@v5 
        with:
          python-version: "3.12"

      - name: checkov install 
        run: pip install checkov 
         
      - name: Run Frontend Dockerfile Scan 
        run: |
          checkov -d ./frontend \
            --framework dockerfile \
            --output json > checkov-dockerfile-report.json || true

      - name: Upload Checkov Artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkov-dockerfile-report
          path: ${{ github.workspace }}/checkov-dockerfile-report.json
          if-no-files-found: error

  checkov-backend:
    name: Checkov Dockerfile backend scan 
    needs: [gitleak-scan] 
    runs-on: ubuntu-latest
    steps:
      - name: checkout source code 
        uses: actions/checkout@v4

      - name: setup python 
        uses: actions/setup-python@v5 
        with:
          python-version: "3.12"

      - name: checkov install 
        run: pip install checkov 
         
      - name: Run Backend Dockerfile Scan 
        run: | 
          checkov -d ./backend \
            --framework dockerfile \
            --output json > checkov-backend-report.json || true

      - name: Upload Checkov Artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkov-backend-report
          path: ${{ github.workspace }}/checkov-backend-report.json
          if-no-files-found: error

  trivy-backend-scan:
    name: Trivy  Backend Scan
    needs: [gitleak-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy on Java Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend' 
          format: 'json'
          output: 'trivy-backend-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on  backendtable
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend' 
          format: 'table'
          output: 'trivy-backendtable-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload Backend Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-security-report
          path: ${{ github.workspace }}/trivy-backend-report.json
          if-no-files-found: error

      - name: Upload Backend table Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backendtable-security-report
          path: ${{ github.workspace }}/trivy-backendtable-report.json
          if-no-files-found: error

  trivy-frontend-scan:
    name: Trivy Nginx Frontend Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy on Nginx Frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: './frontend' 
          format: 'json'
          output: 'trivy-frontend-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy on Nginx Frontend table format 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: './frontend' 
          format: 'table'
          output: 'trivy-frontendtable-report.json'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-security-report
          path: ${{ github.workspace }}/trivy-frontend-report.json
          if-no-files-found: error 

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontendtable-security-report
          path: ${{ github.workspace }}/trivy-frontendtable-report.json
          if-no-files-found: error 
       
       
             

       
